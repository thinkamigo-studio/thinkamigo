<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Contact | Thinkamigo</title>
    
    <link rel="stylesheet" href="chassis.css">
    <link rel="stylesheet" href="home-portal.css">

<body class="content-page">

    <header id="main-nav"></header>

    <main class="editorial-post">
        
        <div class="paper-sheet">

            <article class="text-rail">



                <p class="breadcrumb">
                    <a href="index.html">Home</a>  &gt; 
                    Contact 
                </p>


                <header>
                    <h1>Contact</h1>
                    <div class="orange-rule"></div>
                    <h2>Tell me about your requirements</h2>
                </header>

                <form action="contact-engine.php" method="POST" class="contact-form-refined">
                    
                    <div class="hp-gate" style="display:none;">
                        <label>Keep this field blank</label>
                        <input type="text" name="honeypot">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required placeholder="How can I help?"></textarea>
                    </div>

                    <button type="submit" class="btn-pill">
                        Send Message
                    </button>
                </form>

            </article> 
        </div> 
    </main> 
    
    <footer id="main-footer"></footer>
    <script src="loader.js"></script>
